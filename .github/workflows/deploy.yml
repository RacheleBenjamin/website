name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install StatiCrypt
        run: npm install -g staticrypt

      - name: Assemble site (deck + slide images only)
        run: |
          mkdir -p site
          cp -r public/slides site/slides

      - name: Encrypt deck with password
        env:
          DECK_PASSWORD: ${{ secrets.DECK_PASSWORD }}
        run: |
          if [ -z "$DECK_PASSWORD" ]; then
            echo "::error::DECK_PASSWORD secret is not set. Add it in repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx staticrypt public/case-study-shopping.html \
            --password "$DECK_PASSWORD" \
            --short \
            --template-title "Rachele Benjamin — Case Study" \
            --template-instructions "Enter the password I shared with you to view this case study." \
            --template-button "Unlock" \
            -d site
          mv site/case-study-shopping.html site/index.html

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
